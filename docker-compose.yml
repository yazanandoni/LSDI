services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./autojoin/data:/app/autojoin/data
    environment:
      - APP_DATA_ROOT=autojoin
      - JAVA_TOOL_OPTIONS=-Xmx8g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
