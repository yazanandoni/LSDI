<section class="container section">
  <div class="section__header">
    <div>
      <p class="eyebrow">Upload</p>
      <h2>Bring your own CSV pairs</h2>
    </div>
    <p class="helper">Upload source/target CSVs and run AutoJoin on your data.</p>
  </div>

  <div class="card upload">
    <div class="dropzone">
      <p>Drop CSV files here or click to browse.</p>
      <button class="btn btn--primary">Select files</button>
    </div>
    <div class="note">
      <p>{{ message }}</p>
    </div>
  </div>
</section>
